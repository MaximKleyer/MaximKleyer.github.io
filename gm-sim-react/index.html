<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valorant GM Simulator | Maxim Kleyer</title>

    <!-- Same fonts as your portfolio for visual consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <!--
        This is the ONLY HTML element on the page.
        React takes over from here — it "mounts" your entire app
        inside this div. Everything you see in the browser is
        generated by JavaScript, not written in HTML.

        In vanilla JS, you wrote innerHTML everywhere.
        In React, this single div is the last piece of HTML you'll touch.
    -->
    <div id="root"></div>

    <!--
        Vite handles this script tag:
        - In development ("npm run dev"), it serves main.jsx with hot reload
        - In production ("npm run build"), it bundles everything into
          optimized files in the output folder
    -->
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
